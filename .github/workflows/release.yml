name: Release

# Publishing is a deliberate, manual act: cut a GitHub Release (tag vX.Y.Z)
# once the "Version Packages" PR from version.yml has been merged to main.
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) needs npm >=11.5.1; setup-node's bundled
      # npm is older, so upgrade before publishing.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm publish --provenance --access public
